<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 Letters to Laiba</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="password-page">

   <!-- Intro Screen -->
<div id="intro">
    <div class="intro-content">
        <h1>💌 Letters to Laiba</h1>
        <p>A Little World Made with Love 🌸</p>
        <button id="startBtn">🌷 I Promise</button>
    </div>
</div>

<!-- Animated Background -->
<div class="background"></div>

<!-- Floating Hearts -->
<div id="floating-hearts"></div>

<!-- Login -->
<div class="login-wrapper">

    <div class="container">

        <h1>💌 Letters to Laiba</h1>

        <p class="subtitle">
            Welcome to my little world 🌸
        </p>

        <div class="password-box">

            <input
                type="password"
                id="password"
                placeholder="Enter Password">

            <button onclick="checkPassword()">
                Unlock ❤️
            </button>

        </div>

        <p class="quote">
            "Some doors open only with the right key..."
        </p>

        <button id="musicBtn">
            🎵 Play Music
        </button>

    </div>

</div>

<!-- Loading Screen -->
<div id="loading-screen">

    <h2>✨ Preparing Your Little World...</h2>

    <div class="loader">
        <div class="progress"></div>
    </div>

    <p>Please wait a moment 🌸</p>

</div>

<!-- Music -->
<audio id="bgMusic" loop>
    <source src="music/theme.mp3" type="audio/mpeg">
</audio>

<!-- Welcome Popup -->
<div id="welcome-popup">

    <div class="popup-card">

        <h2>💖 Welcome Back</h2>

        <p>Laiba 🌸</p>

        <button id="continueBtn">
            Continue ✨
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
