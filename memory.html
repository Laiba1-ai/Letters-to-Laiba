    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body class="home-page">

<nav class="navbar">

    <div class="logo">💌 Letters to Laiba</div>

    <ul>

        <li><a href="home.html">🏠 Home</a></li>

        <li><a href="birthday.html">🎂 Birthday</a></li>

<div class="home">

    <h1>📦 Memory Box</h1>

    <p>Your saved letters 💖</p>

    <div class="memory-box">

        <input
        type="text"
        id="searchLetters"
        placeholder="🔍 Search your letters...">

        <div id="memoryList">

            <p class="empty-memory">
                No saved letters yet 💌
            </p>

        </div>

    </div>

</div>

<!-- Memory Popup -->

<div id="letterPopup">

    <div class="popup-content">

        <button id="closePopup">✕ Close</button>

        <h2 id="popupTitle"></h2>

        <h4 id="popupName"></h4>

        <p id="popupMessage"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
