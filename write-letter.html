<body>

<div class="background"></div>

<div id="floating-hearts"></div>
<div id="fireworks"></div>
<div id="confetti"></div>

<nav class="navbar">

    <div class="logo">💌 Letters to Laiba</div>

    <ul>

        <li><a href="home.html">🏠 Home</a></li>

        <li><a href="birthday.html">🎂 Birthday</a></li>

        <li><a href="letters.html">💌 Letters</a></li>

    </ul>

</nav>

<main class="birthday-card">

    <h1>💌 Write Your Letter</h1>

    <p>
        Write your feelings from your heart ❤️
    </p>

    <div class="birthday-grid">

        <!-- LEFT -->

        <div class="birthday-letter">

            <h2>💌 Your Letter</h2>

            <input
            type="text"
            id="name"
            placeholder="Your Name">

            <br><br>

            <input
            type="text"
            id="title"
            placeholder="Letter Title">

            <br><br>

            <textarea
            id="message"
            maxlength="2000"
            placeholder="Write your feelings..."></textarea>

            <div id="count">0 / 2000</div>

            <br>

            <button id="saveBtn">
                💖 Save Letter
            </button>

            <button id="deleteBtn">
                🗑 Delete
            </button>

      </div>

        <!-- RIGHT -->

        <div class="right-side">

            <div class="gift-container">

                <h2>📷 Upload Photo</h2>

                <input
                type="file"
                id="photo"
                accept="image/*">

                <img
    id="preview"
    src=""
    alt="Photo Preview"
    style="display:none;">

            </div>

            <div class="gift-container">

                <div id="giftBox">

                    🎁

                 </div>

                <div
                id="giftMessage"
                style="display:none;">

                    💖 Thank you for writing this beautiful letter.

                </div>

            </div>

            <div class="cake-container">

                <div id="cake">

                    🎂

                </div>

                <div id="wishMessage"></div>

           </div>

        </div>

 </div>

</main>

<script src="script.js"></script>

</body>
</html>
