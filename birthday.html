<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>
    <nav class="navbar">

    <div class="logo">💌 Letters to Laiba</div>

    <ul>

        <li><a href="home.html">🏠 Home</a></li>

        <li><a href="birthday.html">🎂 Birthday</a></li>

        <li><a href="gallery.html">📷 Gallery</a></li>

        <li><a href="letters.html">💌 Letters</a></li>

    </ul>

</nav>
<div id="floating-hearts"></div>
<div id="balloons"></div>
<div id="fireworks"></div>
<div id="confetti"></div>
<div class="birthday-card">

<h1>🎂 Happy Birthday 🎂</h1>

<p>
Today is all about smiles, happiness and beautiful memories. 🌸
</p>

<div class="birthday-grid">

  <div class="birthday-letter">

    <h2>💌 A Special Message</h2>

    <p id="typingText"></p>

    <img
    id="birthdayPreview"
    style="
    display:none;
    width:220px;
    margin-top:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    ">

    <input
    type="file"
    id="birthdayPhoto"
    accept="image/*"
    hidden>

    <div class="birthday-buttons">

        <button id="editBirthdayBtn">
        ✏️ Edit Letter
        </button>

        <button id="changeBirthdayPhoto">
        🖼 Change Picture
        </button>

        <button id="saveBirthdayBtn">
        💾 Save
        </button>

        <button id="deleteBirthdayPhoto">
        🗑 Delete Picture
        </button>

        <button id="resetBirthdayBtn">
        🔄 Reset
        </button>
<button id="shareBirthdayBtn">
📤 Share
</button>
    </div>

</div>
<div class="right-side">
        <div class="cake-container">

            <div id="cake">🎂</div>

            <p id="wishMessage"></p>

        </div>

        <div class="gift-container">

            <div id="giftBox">🎁</div>

           <div id="giftMessage" style="display:none;">

<p id="giftText">
💖 You are amazing! Wishing you endless happiness, success, and beautiful moments.
</p>

<div class="gift-buttons">

<button id="editGiftBtn">
✏️ Edit
</button>

<button id="saveGiftBtn" style="display:none;">
💾 Save
</button>

<button id="resetGiftBtn" style="display:none;">
🔄 Reset
</button>

</div>

</div>

    </div>

</div>
<button onclick="window.location.href='home.html'">
🏠 Back Home
</button>

</div>
<script src="script.js"></script>
<div id="sharePopup" class="share-popup">

<div class="share-box">

<h2>📤 Share This Page</h2>

<button class="shareOption" data-type="whatsapp">
💚 WhatsApp
</button>

<button class="shareOption" data-type="facebook">
💙 Facebook
</button>

<button class="shareOption" data-type="twitter">
🖤 X (Twitter)
</button>

<button class="shareOption" data-type="telegram">
📩 Telegram
</button>

<button class="shareOption" data-type="copy">
📋 Copy Link
</button>

<button id="closeShare">
❌ Close
</button>

</div>

</div>
</body>

</html>
