<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🎂</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>
<body class="birthday">

<div id="birthdayIntro" style="display:none;">
    <div class="intro-content">

        <h1 id="countNumber">3</h1>

        <p id="introText">
            🎂 A Special Surprise Is Waiting...
        </p>

    </div>
</div>

    <nav class="navbar">

    <div class="logo">💌 Letters to Laiba</div>

    <ul>

        <li><a href="home.html">🏠 Home</a></li>

        <li><a href="birthday.html">🎂 Birthday</a></li>

 
       <li><a href="letters.html">💌 Letters</a></li>

    </ul>

</nav>
<div id="floating-hearts"></div>
<div id="balloons"></div>
<div id="fireworks"></div>
<div id="confetti"></div>
<div class="birthday-card">

<h1>🎂 Happy Birthday 🎂</h1>
 
<p>
Today is all about smiles, happiness and beautiful memories. 🌸
</p>

<div class="birthday-grid">

  <div class="birthday-letter">

    <h2>💌 A Special Message</h2>

    <p id="typingText"></p>

  <img
id="birthdayPreview"
alt="Birthday Memory">

    <input
    type="file"
    id="birthdayPhoto"
    accept="image/*"
    hidden>

    <div class="birthday-buttons">

        <button id="editBirthdayBtn">
        ✏️ Edit Letter
        </button>

        <button id="changeBirthdayPhoto">
        🖼 Change Picture
        </button>

        <button id="saveBirthdayBtn">
        💾 Save
        </button>
        <button id="previewBirthdayBtn">
    🎬 Preview Surprise
</button>

        <button id="deleteBirthdayPhoto">
        🗑 Delete Picture
        </button>

        <button id="resetBirthdayBtn">
        🔄 Reset
        </button>
<button class="shareBtn">
📤 Share
</button>
    </div>

</div>
<div class="right-side">
        <div class="cake-container">

            <div id="cake">🎂</div>
            <div id="cakeEffect"></div>
            <p id="wishMessage"></p>

        </div>

        <div class="gift-container">

    <div id="giftBox">🎁</div>

    <div id="giftMessage" style="display:none;">
        💖 You are amazing! Wishing you endless happiness.
    </div>

    <textarea
        id="giftEditor"
        placeholder="Write your surprise message..."
        style="display:none;">
    </textarea>

    <button id="saveGiftBtn" style="display:none;">
        💾
    </button>

</div>
    </div>

</div>
<button onclick="window.location.href='home.html'">
🏠 Back Home
</button>

</div>
</div>
<script src="script.js"></script>

</body>
</html>
