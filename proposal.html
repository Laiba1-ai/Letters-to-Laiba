<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal 💍</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">
<div class="logo">💌 Letters to Laiba</div>

<ul>
<li><a href="home.html">🏠 Home</a></li>
<li><a href="birthday.html">🎂 Birthday</a></li>
<li><a href="gallery.html">📷 Gallery</a></li>
<li><a href="letters.html">💌 Letters</a></li>
</ul>
</nav>

<div class="birthday-card">

<h1>💍 Proposal</h1>

<p>
Some feelings are too beautiful to stay hidden forever. ❤️
</p>
<div class="birthday-grid">

    <!-- LEFT -->

    <div class="birthday-letter">

        <h2>💍 Your Proposal</h2>

        <textarea
            id="proposalMessage"
            placeholder="Write your proposal here..."></textarea>

        <br><br>

<button id="saveProposal">
💖 Save Proposal
</button>
    </div>

    <!-- RIGHT -->

    <div class="right-side">

        <!-- Upload -->

        <div class="gift-container">

            <h2>📷 Upload Photo</h2>

            <input
                type="file"
                id="proposalPhoto"
                accept="image/*">

            <img
                id="proposalPreview"
                style="display:none;max-width:100%;border-radius:12px;">

        </div>

        <!-- Gift -->

        <div
            class="gift-container"
            id="proposalGift">

            🎁

        </div>

        <div
            id="proposalGiftMessage"
            style="display:none;">

            💖 A beautiful surprise is waiting...

        </div>

        <!-- Flower -->

        <div
            class="cake-container"
            id="proposalFlower">

            🌹

        </div>

        <div
            id="proposalRing"
            style="display:none;font-size:90px;">

            💍

        </div>

        <h2
            id="proposalText"
            style="display:none;">

            Will You Marry Me? ❤️

        </h2>

    </div>

</div>
<button onclick="window.location.href='home.html'">
🏠 Back Home
</button>

</div>

<script src="script.js"></script>

<body class="proposal-page">
</html>
